version: "3.8"

services:

  traefik:
    image: traefik:v2.11
    container_name: traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.myresolver.acme.httpchallenge=true
      - --certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.myresolver.acme.email=paulmernov@gmail.com
      - --certificatesresolvers.myresolver.acme.storage=/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme.json:/acme.json
    restart: always

  compilation-service:
    build: ./compilation_service
    container_name: compilation-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.compilation.rule=Host(`api.riscvcourse.ru`) && PathPrefix(`/compilation`)"
      - "traefik.http.routers.compilation.entrypoints=websecure"
      - "traefik.http.routers.compilation.tls.certresolver=myresolver"
    expose:
      - "3000"
    volumes:
      - ./compilation_service/src/logs:/combined.logs
      - ./compilation_service/src/logs:/error.log

  mock-auth-service:
    build: ./mock_auth_service
    container_name: mock-auth-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mockauth.rule=Host(`api.riscvcourse.ru`) && PathPrefix(`/mockauth`)"
      - "traefik.http.routers.mockauth.entrypoints=websecure"
      - "traefik.http.routers.mockauth.tls.certresolver=myresolver"
    expose:
      - "3003"
    volumes:
      - ./mock_auth_service/src/logs:/combined.logs
      - ./mock_auth_service/src/logs:/error.log

  contest-service:
    build: ./contest_service
    container_name: contest-service
    depends_on:
      - contest-db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.contest.rule=Host(`api.riscvcourse.ru`) && PathPrefix(`/contest`)"
      - "traefik.http.routers.contest.entrypoints=websecure"
      - "traefik.http.routers.contest.tls.certresolver=myresolver"
      - "traefik.http.middlewares.contest-stripprefix.stripprefix.prefixes=/contest"
      - "traefik.http.routers.contest.middlewares=contest-stripprefix"
    expose:
      - "3002"
    volumes:
      - ./contest_service/src/logs:/combined.logs
      - ./contest_service/src/logs:/error.log

  submission-service:
    build: ./submission_service
    container_name: submission-service
    depends_on:
      - submission-db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.submission.rule=Host(`api.riscvcourse.ru`) && PathPrefix(`/submission`)"
      - "traefik.http.routers.submission.entrypoints=websecure"
      - "traefik.http.routers.submission.tls.certresolver=myresolver"
    expose:
      - "3004"
    volumes:
      - ./submission_service/src/logs:/combined.logs
      - ./submission_service/src/logs:/error.log

  contest-db:
    image: postgres:18
    container_name: contest-db
    environment:
      POSTGRES_USER: pavel_mernov
      POSTGRES_PASSWORD: 0867
      POSTGRES_DB: contest_database
    ports:
      - "5432:5432"
    volumes:
      - contest_volumes:/var/lib/postgresql

  submission-db:
    image: postgres:18
    container_name: submission-db
    environment:
      POSTGRES_USER: pavel_mernov
      POSTGRES_PASSWORD: 0867
      POSTGRES_DB: submission_database
    ports:
      - "5433:5432"
    volumes:
      - submission_volumes:/var/lib/postgresql

  redis:
    image: redis
    container_name: redis

volumes:
  submission_volumes:
  contest_volumes:

networks:
  default:
    driver: bridge